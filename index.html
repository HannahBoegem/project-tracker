<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker — Hannah Boegem</title>
  <style>
    :root{--bg:#F0F2F5;--surface:#fff;--border:#E5E7EB;--text:#111827;--muted:#6B7280;--primary:#2563EB;--green:#059669;--red:#DC2626;--orange:#EA580C;--yellow:#D97706;--purple:#7C3AED;--gray:#6B7280;--grayLight:#F9FAFB;--r:8px;--s:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--sm:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06)}
    /* ── Reminders ── */
    .rem-section{margin-bottom:20px}
    .rem-heading{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .rem-count{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px}
    .rem-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:0;margin-bottom:10px;box-shadow:var(--s);overflow:hidden}
    .rem-card.type4{border-left:4px solid var(--orange)}
    .rem-card.type1{border-left:4px solid var(--primary)}
    .rem-card.typepos{border-left:4px solid var(--purple)}
    .rem-card.typegls{border-left:4px solid var(--green)}
    .rem-badge.bgls{background:#ECFDF5;color:#065F46}
    .rem-header{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px 10px;gap:12px}
    .rem-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
    .rem-proj{font-size:13px;color:var(--muted);margin-top:2px}
    .rem-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;flex-shrink:0}
    .rem-badge.b4{background:#FFF7ED;color:var(--orange)}
    .rem-badge.b1{background:#EFF6FF;color:var(--primary)}
    .rem-badge.bpos{background:#F5F3FF;color:var(--purple)}
    .rem-items{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px}
    .rem-item{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text);line-height:1.5}
    .rem-cb{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:2px;cursor:pointer;appearance:none;-webkit-appearance:none;background:#fff;transition:all .15s}
    .rem-cb:checked{background:var(--primary);border-color:var(--primary)}
    .rem-cb:checked+.rem-label{text-decoration:line-through;color:var(--muted)}
    .rem-label{cursor:pointer}
    .rem-card{transition:opacity .35s,transform .35s,max-height .4s,margin .4s,padding .4s}
    .rem-card.dismissing{opacity:0;transform:translateY(-6px);max-height:0;margin-bottom:0;overflow:hidden}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px}
    .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
    .header h1{font-size:22px;font-weight:700}
    .header .sub{font-size:13px;color:var(--muted);margin-top:3px}
    .sync{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;white-space:nowrap;box-shadow:var(--s)}
    .dot{width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0}
    .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
    .sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .15s;box-shadow:var(--s);position:relative;overflow:hidden}
    .sc:hover{transform:translateY(-2px);box-shadow:var(--sm)}
    .sc.on{border-color:var(--primary)}.sc.on::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
    .sc.cr.on::before{background:var(--red)}.sc.co.on::before{background:var(--orange)}.sc.cy.on::before{background:var(--yellow)}.sc.cp.on::before{background:var(--purple)}.sc.cg.on::before{background:var(--green)}
    .sn{font-size:30px;font-weight:700;line-height:1;margin-bottom:5px}
    .sl{font-size:12px;color:var(--muted);font-weight:500;line-height:1.3}
    .cb .sn{color:var(--primary)}.cr .sn{color:var(--red)}.co .sn{color:var(--orange)}.cy .sn{color:var(--yellow)}.cp .sn{color:var(--purple)}.cg .sn{color:var(--green)}
    .ctrl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:var(--s)}
    .sw{position:relative;flex:1;min-width:200px}
    .sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    .si{width:100%;padding:8px 10px 8px 34px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;transition:border-color .15s;color:var(--text)}
    .si:focus{border-color:var(--primary)}
    .ss{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;background:#fff;color:var(--text);cursor:pointer}
    .tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--s)}
    .th{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--grayLight)}
    .tt{font-size:13px;font-weight:600;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--grayLight);white-space:nowrap;user-select:none}
    tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#F8FAFC}
    tbody td{padding:11px 14px;font-size:13px;vertical-align:middle}
    .pn a{font-weight:600;color:var(--primary);text-decoration:none;font-size:13px;line-height:1.4}
    .pn a:hover{text-decoration:underline}
    .pa{font-size:11px;color:var(--muted);margin-top:2px}
    .bn{display:inline-flex;align-items:center;background:#EDE9FE;color:#5B21B6;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;letter-spacing:.03em}
    .b{display:inline-flex;align-items:center;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
    .sC{background:#EFF6FF;color:#1D4ED8}.sG{background:#ECFDF5;color:#065F46}.sD{background:#F5F3FF;color:#5B21B6}.sH{background:#F3F4F6;color:#374151;border:1px solid #E5E7EB}.sSc{background:#FFFBEB;color:#92400E}.sB{background:#FEF3C7;color:#B45309}.sX{background:#F3F4F6;color:#374151}
    .pPMS{background:#EFF6FF;color:#1D4ED8}.pPOS{background:#F5F3FF;color:#5B21B6}.pMPP{background:#ECFDF5;color:#065F46}.pRMS{background:#FFF7ED;color:#C2410C}.pPI{background:#FDF4FF;color:#7E22CE}.pO{background:#F3F4F6;color:#374151}
    .ge{background:#FEF2F2;color:#DC2626}.gu{background:#FFF7ED;color:#EA580C}.gs{background:#FFFBEB;color:#D97706}.gk{background:#ECFDF5;color:#059669}.gl{background:#ECFDF5;color:#059669}.gm{background:#F3F4F6;color:#9CA3AF;border:1px solid #E5E7EB}
    .dt{white-space:nowrap}.ds{font-size:11px;color:var(--muted);margin-top:2px}.nd{color:#D1D5DB}
    .empty{text-align:center;padding:56px 24px;color:var(--muted)}.ei{font-size:36px;margin-bottom:10px}
    /* ── Notes panel ── */
    .notes-btn{background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--primary);padding:2px 0;margin-top:4px;display:inline-flex;align-items:center;gap:4px;opacity:.8}
    .notes-btn:hover{opacity:1;text-decoration:underline}
    .exp-row td{padding:0!important;border-bottom:1px solid var(--border)}
    .exp-panel{background:#F8FAFC;padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
    .hw-block{display:flex;flex-direction:column;gap:4px}
    .hw-block.full{grid-column:1/-1}
    .hw-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
    .hw-text{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.6}
    .hw-updated{font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);grid-column:1/-1}
    .chatter-section{grid-column:1/-1;margin-top:4px;padding-top:12px;border-top:1px solid var(--border)}
    .chatter-heading{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
    .chatter-post{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px}
    .chatter-meta{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
    .chatter-body{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.6}
    /* ── Role filter ── */
    .role-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .role-lbl{font-size:12px;font-weight:600;color:var(--muted);margin-right:2px}
    .role-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;box-shadow:var(--s)}
    .role-btn:hover{border-color:var(--primary);color:var(--primary)}
    .role-btn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
    .role-btn.on.r2{background:#7C3AED;border-color:#7C3AED}
    .r2nd{display:inline-flex;align-items:center;background:#EDE9FE;color:#5B21B6;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle;letter-spacing:.03em}
    @media(max-width:1300px){.stats{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){body{padding:12px}}
  </style>
</head>

dy": "Have chased the site up multiple times to schedule in the configuration export call but no further reply"}, {"author": "Eva Parizkova", "date": "2026-03-18", "body": "&#127807; Production Info Validated ✅\n(All details confirmed and verified for the environment creation)\n \nLegal Environment: New ZealandChain: NoTemplate Selector: No, ClarityTime Zone: (UTC+12:00) Auckland, WellingtonCurrency: NZDNet/Gross: Gross"}]}, {"id": "a0sQC000001Y20PYAS", "name": "Flagstaff Estate 2025 Onboarding PMS", "account": "Flagstaff Estate", "stage": "Configuration", "goLive": "2026-06-01", "startDate": "2026-01-05", "stageSince": "2026-01-22", "created": "2026-01-01", "product": "PMS", "install": "Classic", "role": "secondary", "handovers": [{"product": "PMS", "notes": "* Background:\nThis is 1 of 2 properties by the same owners. Their first property, Flagstaff Estate (this one), has 8 accommodations and is mainly used for Weddings & Events. Their second property was recently bought (Stonefield Estate) which would be set up similar to Flagstaff. They are using Cloudbeds today at Flagstaff.\n\n* Objectives\nThey needed a system that had more functionality, requiring less manual work for Lucy. Lucy wanted a system that provides better reporting capabilities, automates guest communication and payments, and handles event add-ons to accommodation bookings. They understand that we don't have Mews Events, but our group functionality alone was more than she had with CB. She also wants to be able to set minimum LOS restrictions. They were also wanting a system with Multi-property functionality as they plan on continuing on growing the business.\n\n* Product Objections\nNo digital keys, kiosk, terminals, POS or RMS needed for this type of property.\n\n* Legal Readiness\nThey are ready to onboard ASAP.\n\n* Terminals / Mews Payments\nNo terminals - will be heavily relying on Mews payments & our automations to create less manual work for Lucy.\n\n* Integrations listed\nSiteminder (using for airbnb)\nXero\n\n* Legal status\nYes, Australia property.\n\n* Timeline expectations\nWant to onboard ASAP and requested no OBM so Classic was offered instead. Stonefield Estate is set up to start 1 month after, but Lucy may want to start earlier. My recommendation is they do the 1st property and we can copy over as much information from Flagstaff to Stonefield to minimize onboarding work.\n\n--CSM--\n\nWhat are the potential upsells in the next 12-18 months?\nNothing at this time. Unless the Owners buy another property to expand operations. They really wanted a system that could be a long term partner as they grow their business.\n\nWhy do they need a CSM?\nThis is low MRR, but they have 2 properties. They previously mentioned the lack of support they felt with CB.\n\nSA Notes? \nN/A\n\nProject Manager/Champion: \nLucy Kerr \nNOTE: The Owners (Chantelle & Matt) + Lucy Kerr all share the same email address.\n\nTech Savvy Gauge \n4/5\n\nSystem/Onboarding Experience\nShe did not set up CB, but we spent an extensive amount of time on demos going through workflows and setup.\n\nOutstanding information requested \nN/A\n\nWhat’s important to the customer \n\nWho are the stakeholders for onboarding and after go live\nLucy Kerr\nChantelle & Matt (Owners)", "integrations": "n/a", "marketplace": "Siteminder\nAirbnb through Siteminder\nXero", "prevPos": "", "paymentProvider": "", "mewsPayments": "", "mewsTerminals": "", "updatedAt": "2026-01-01"}], "chatter": [{"author": "Kenya Grigsby", "date": "2026-01-28", "body": "Customer wants to upgrade to classic+ for this project to have a dedicated OBM. This has been flagged to sale to help with recontracting.\n \nFYI: @Hanneke Heuvelmans​ ​ @Josh Watson​ @Elena Martin Bönke​"}, {"author": "Kenya Grigsby", "date": "2026-01-26", "body": "Hi Team, I met with this customer today and they asked to upgrade their package to Classic+ for this property only as they want to have a dedicated OBM to assist them. I have flagged this to the s ull, "startDate": "2026-08-01", "stageSince": "2025-07-24", "created": "2025-06-02", "product": "PMS", "install": "Classic Plus", "role": "primary", "handovers": [{"product": "PMS", "notes": "Mews Chain: No information provided  \n\nCapsule hotel/hostel\nKiosk\nLooking into IoT options and building their own app to control lights, beds and other electrics\nPreviously have used Cloudbeds at other properties\nCustomer also manages student accommodation in Melbourne\nAdditional properties expected in Sydney and Brisbane next year\nLoyalty is important - not yet built\nRFID wristbands an option\n4/5 tech savvy\nGST number TBC", "integrations": "Looking into IoT options", "marketplace": "", "prevPos": "", "paymentProvider": "", "mewsPayments": "", "mewsTerminals": "", "updatedAt": "2025-12-02"}], "chatter": [{"author": "Barbora Tonzarova", "date": "2025-10-15", "body": "Hey @David Steerenberg​ apologies to tag you, but I am looking for somebody taking over Hayden, is this deal still active? We are missing key info in handover, thank you for help!"}, {"author": "Aisha Honzlová", "date": "2025-10-08", "body": "@Tom Chappel​ do you have any info about this project? Hayden is no longer with mews"}]}, {"id": "a0sQC000001liEkYAI", "name": "Ever Bloomfield 2026 Onboarding POS", "account": "Ever Bloomfield", "stage": "Onboarding Blocked", "goLive": null, "startDate": "2026-08-01", "stageSince": "2026-03-13", "created": "2026-03-13", "product": "POS", "install": "Standard Online", "role": "primary", "handovers": [{"product": "POS", "notes": "Contract start date is August 1st and would like to start onboarding for the restaurant to open on November 1st 2026. \nWill be requiring inventory management but no digital ordering required.\nThe restaurant is all inclusive and included in room rates. Pat will be loading in alcohol and proteins as products and is really only using Mews POS for stock tracking. There is a gallery onsite and will load in items which will be paid for at purchase.\nAny additional F&B charges will be posted to guest billing, for example, alcohol that's not included in package. \nPlease check gross/net environment requirements with Pat. \nWill be requring printer set up to kitchen and bar. \nLooking at S2 temrinals but not been decided yet.", "integrations": "", "marketplace": "", "prevPos": "0. None - New Property", "paymentProvider": "Stripe", "mewsPayments": "", "mewsTerminals": "", "updatedAt": "2026-03-13"}], "chatter": []}, {"id": "a0sQC0000023OSrYAM", "name": "Sea Spray Suites 2026 Onboarding PMS (Clarity)", "account": "Sea Spray Suites", "stage": "Onboarding Blocked", "goLive": null, "startDate": "2026-07-02", "stageSince": "2026-05-11", "created": "2026-05-01", "product": "PMS", "install": "Classic Plus", "role": "secondary", "handovers": [{"product": "PMS", "notes": "Clarity - Classic+ Onboarding NZ, Time Auckland +13, Gross, Individual\n\nOnboarding Start: 6 July \nLive first week of  Aug\n\nShoud be a simple set up.\n\nLorraine is the owner and will be in charge for the onboarding and KYB and is the main contact person.\n\nLorraine's previous experience with a system transition (to Opera at a prior hotel) was described as \"scary and daunting – everyone hated it.\" She was pleasantly surprised by how intuitive Mews looks.\n\n\n\nKey pain points identified:\n-Manual credit card transfer from Star → Clarity for every booking (time-consuming, security risk)\n-No automated payment processing or reconciliation\n-Inability to edit archived bills in Clarity (business guests requesting address changes post-checkout was a major frustration)\n-Manual end-of-shift reconciliation (~5 minutes per shift)\n\nCritical Reports (replicate from Clarity)\n-Housekeeping reports – daily\n-End-of-day financials – full posting audit + cashier banking report (end of each shift)\n-Owner's reports – monthly, per room (revenue per room + occupancy %)\n-Sales and holding reports", "integrations": "none", "marketplace": "Booking.com\nExpedia\ function diff(d1,d2){return Math.round((d2-d1)/86400000)}
function pd(s){
  if(!s) return null;
  const d=new Date(s+'T12:00:00');
  d.setHours(0,0,0,0);
  return d;
}

const P=RAW.map(p=>{
  const gl=pd(p.goLive),days=gl?diff(TODAY,gl):null;
  let s;
  if(!gl) s='missing';
  else if(['Go Live Support','Completed','Ongoing'].includes(p.stage)) s='live';
  else if(days<0) s='expired';
  else if(days===0) s='today';
  else if(days<=7) s='urgent';
  else if(days<=30) s='soon';
  else s='ok';
  return{...p,gl,days,glS:s,isNew:diff(pd(p.created),TODAY)<=45};
});

let flt='all',srt='goLive',qry='',roleFlt='all';

// ── Reminders ────────────────────────────────────────────────────────────────
function computeReminders(){
  const rems=[];
  for(const p of P){
    // ── PMS reminders (start-date based) ──
    if(p.product==='PMS'&&p.startDate){
      const start=pd(p.startDate);
      const dUntil=diff(TODAY,start);
      const isMonStart=start.getDay()===1;
      if(dUntil===4) rems.push({type:'4day',p,dUntil});
      if((!isMonStart&&dUntil===1)||(isMonStart&&dUntil===3))
        rems.push({type:'1day',p,dUntil});
    }
    // ── POS reminders (assigned within last 14 days) ──
    if((p.product==='POS'||p.product==='POS Inventory')&&p.created){
      const daysOld=diff(pd(p.created),TODAY);
      if(daysOld>=0&&daysOld<=14)
        rems.push({type:'pos',p,daysOld});
    }
    // ── Go Live Support overdue reminders ──
    if(p.stage==='Go Live Support'&&p.stageSince){
      const daysSince=diff(pd(p.stageSince),TODAY);
      const threshold=p.product==='MPP'?5:30;
      const glsProducts=['PMS','RMS','POS','POS Inventory','MPP'];
      if(glsProducts.includes(p.product)&&daysSince>=threshold)
        rems.push({type:'gls',p,daysSince,threshold});
    }
  }
  // Sort: POS new-assignment first, then PMS by urgency, then GLS
  rems.sort((a,b)=>{
    const order={pos:0,'1day':1,'4day':2,gls:3};
    return(order[a.type]??3)-(order[b.type]??3);
  });
  return rems;
}

function setupRemListeners(){
  document.querySelectorAll('.rem-cb').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const card=cb.closest('.rem-card');
      if(!card) return;
      const all=[...card.querySelectorAll('.rem-cb')];
      if(all.every(c=>c.checked)){
        card.classList.add('dismissing');
        setTimeout(()=>{
          card.remove();
          const section=document.getElementById('remSection');
          if(section&&!section.querySelector('.rem-card'))
            section.innerHTML='';
        },420);
      }
    });
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function stCls(s){
  return{Configuration:'sC','Go Live Support':'sG','Deployment queue':'sD','On hold':'sH',Screening:'sSc','Onboarding Blocked':'sB'}[s]||'sX';
}
function prCls(p){
  return{PMS:'pPMS',POS:'pPOS',MPP:'pMPP',RMS:'pRMS','POS Inventory':'pPI'}[p]||'pO';
}
function glBadge(p){
  const cls={expired:'ge',today:'ge',urgent:'gu',soon:'gs',ok:'gk',live:'gl',missing:'gm'}[p.glS];
  const lbl={expired:`Overdue ${Math.abs(p.days)}d`,today:'Go Live Today',urgent:`${p.days}d away`,soon:`${p.days}d away`,ok:`${p.days}d away`,live:'Went Live ✓',missing:'No Date Set'}[p.glS];
  return`<span class="b ${cls}">${lbl}</span>`;
}
function fmt(s){
  if(!s) return'<span class="nd">—</span>';
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function stats(){
  return{
    all:P.length,
    expired:P.filter(p=>p.glS==='expired').length,
    week:P.filter(p=>['urgent','today'].includes(p.glS)).length,
    upcoming:P.filter(p=>['urgent','today','soon'].includes(p.glS)).length,
    missing:P.filter(p=>p.glS==='missing').length,
    newP:P.filter(p=>p.isNew).length,
  };
}

function setRole(r){
  roleFlt=r;
  ['all','primary','secondary'].forEach(k=>{
    const b=document.getElementById('rb-'+k);
    b.className='role-btn'+(k==='secondary'?' r2':'')+(r===k?' on':'');
  });
  renderStats();renderTable();
}

function filtered(){
  let l=P;
  if(roleFlt!=='all') l=l.filter(p=>p.role===roleFlt);
  if(qry){const q=qry.toLowerCase();l=l.filter(p=>p.name.toLowerCase().includes(q)||p.account.toLowerCase().includes(q)||p.stage.toLowerCase().includes(q)||p.product.toLowerCase().includes(q));}
  switch(flt){
    case'expired': l=l.filter(p=>p.glS==='expired');break;
    case'upcoming':l=l.filter(p=>['urgent','today','soon'].includes(p.glS));break;
    case'week':    l=l.filter(p=>['urgent','today'].includes(p.glS));break;
    case'missing': l=l.filter(p=>p.glS==='missing');break;
    case'hold':    l=l.filter(p=>p.stage==='On hold');break;
    case'new':     l=l.filter(p=>p.isNew);break;
  }
  return[...l].sort((a,b)=>{
    if(srt==='goLive'){if(!a.gl&&!b.gl)return 0;if(!a.gl)return 1;if(!b.gl)return-1;return a.gl-b.gl;}
    if(srt==='startDate'){const da=pd(a.startDate),db=pd(b.startDate);if(!da&&!db)return 0;if(!da)return 1;if(!db)return-1;return da-db;}
    if(srt==='created')return pd(a.created)-pd(b.created);
    if(srt==='stageSince')return pd(a.stageSince)-pd(b.stageSince);
    if(srt==='stage')return a.stage.localeCompare(b.stage);
    return a.name.localeCompare(b.name);
  });
}

      <td>${glBadge(p)}</td>
      <td class="dt">${fmt(p.stageSince)}</td>
      <td class="dt">${fmt(p.created)}</td>
      <td></td>
    </tr>`;
    if(!hasNotes) return[mainRow];
    const panelContent=hws.map(h=>{
      const sections=[];
      if(h.notes) sections.push(`<div class="hw-block full"><div class="hw-label">${h.product?h.product+' — ':''}Handover Notes</div><div class="hw-text">${h.notes.replace(/</g,'&lt;')}</div></div>`);
      if(h.integrations&&h.integrations!=='N/A') sections.push(`<div class="hw-block"><div class="hw-label">Integrations to certify</div><div class="hw-text">${h.integrations.replace(/</g,'&lt;')}</div></div>`);
      if(h.marketplace) sections.push(`<div class="hw-block"><div class="hw-label">Marketplace integrations</div><div class="hw-text">${h.marketplace.replace(/</g,'&lt;')}</div></div>`);
      const meta=[];
      if(h.prevPos&&!h.prevPos.startsWith('0.')) meta.push(`Previous POS: ${h.prevPos}`);
      if(h.paymentProvider&&!h.paymentProvider.startsWith('0.')) meta.push(`Payment provider: ${h.paymentProvider}`);
      if(h.mewsPayments) meta.push(`Mews Payments: ${h.mewsPayments}`);
      if(h.mewsTerminals) meta.push(`Mews Terminals: ${h.mewsTerminals}`);
      if(meta.length) sections.push(`<div class="hw-block"><div class="hw-label">Payment & hardware</div><div class="hw-text">${meta.join(' · ')}</div></div>`);
      if(h.updatedAt) sections.push(`<div class="hw-updated">Handover last updated: ${h.updatedAt}</div>`);
      return sections.join('');
    }).join('<hr style="border:none;border-top:1px solid #E5E7EB;margin:8px 0;grid-column:1/-1">');
    const chatterHtml=chats.length?`<div class="chatter-section"><div class="chatter-heading">💬 Chatter Notes</div>${chats.map(c=>`<div class="chatter-post"><div class="chatter-meta">${c.author} &nbsp;·&nbsp; ${c.date}</div><div class="chatter-body">${c.body.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div></div>`).join('')}</div>`:'';
    const expRow=`<tr class="exp-row" id="${rid}" style="display:none"><td colspan="9"><div class="exp-panel">${panelContent}${chatterHtml}</div></td></tr>`;
    return[mainRow,expRow];
  }).join('');
}

function toggleNotes(id){
  const row=document.getElementById(id);
  if(!row) return;
  const open=row.style.display==='none'||row.style.display==='';
  row.style.display=open?'table-row':'none';
  // update button label
  const btn=row.previousElementSibling?.querySelector('.notes-btn');
  if(btn) btn.textContent=open?'▲ Hide notes':'📋 Notes';
}
function setFlt(f){flt=f;renderStats();renderTable();}
document.getElementById('qi').addEventListener('input',e=>{qry=e.target.value.trim();renderTable();});
document.getElementById('so').addEventListener('change',e=>{srt=e.target.value;renderTable();});
renderReminders();
renderStats();
renderTable();
</script>
</body>
